services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql_db
    restart: unless-stopped
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: YourStrong@Passw0rd
      MSSQL_PID: Developer
    ports:
      - '1433:1433'
    volumes:
      - mssql_data:/var/opt/mssql
      - ./database/entrypoint.sh:/entrypoint.sh
      - ./database/init-db.sql:/init-db.sql
    entrypoint: /bin/bash /entrypoint.sh
    networks:
      - app-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong@Passw0rd" -d AppDatabase -Q "SELECT 1" -No
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nestjs_backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 1433
      DB_USERNAME: sa
      DB_PASSWORD: YourStrong@Passw0rd
      DB_DATABASE: AppDatabase
      NODE_ENV: development
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    environment:
      - VITE_API_URL=http://localhost:3000
    ports:
      - '5173:5173'
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  mssql_data:

networks:
  app-network:
    driver: bridge